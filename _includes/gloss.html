<!-- Glossary margin note -->
{% if page.glossary %}
  {% assign found = false %}
  {% for entry in page.glossary %}
    {% if entry.term == include.term %}
      {% assign found = true %}
<aside class="gloss-card" data-term="{{ include.term }}">
  <details>
    <summary class="gloss-summary">{{ include.term }}</summary>
    <div class="gloss-def">{{ entry.def }}</div>
  </details>
</aside>
    {% endif %}
  {% endfor %}
  {% unless found %}
    <span class="gloss-missing">{{ include.term }}<sup>❓</sup></span>
  {% endunless %}
{% endif %}
