<!-- Glossary: look up term from _data/glossary.yml -->
{%- assign found = site.data.glossary | where: "term", include.term | first -%}
{%- if found -%}
<span class="gloss-ref" data-term="{{ found.term }}" data-def="{{ found.def | escape }}" data-url="{{ site.baseurl }}{{ found.url }}">{{ found.term }}</span>
{%- else -%}
{{- include.term -}}
{%- endif -%}
