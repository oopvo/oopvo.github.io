<!-- Glossary: inline reference + margin card -->
{% if page.glossary %}
{% for entry in page.glossary %}
{% if entry.term == include.term %}
<span class="gloss-ref" data-term="{{ include.term }}">{{ include.term }}</span><aside class="gloss-card" data-term="{{ include.term }}">
<details>
<summary class="gloss-summary">{{ include.term }}</summary>
<div class="gloss-def">{{ entry.def }}</div>
</details>
</aside>
{% endif %}
{% endfor %}
{% endif %}
