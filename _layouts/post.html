---
layout: default
---

<div class="post-page-layout">
  <article class="post page-content">
    <div class="post-header">
      <h1>{{ page.title }}</h1>
    </div>

    <div class="entry">
      {{ content }}
    </div>

    <div class="date">
      {{ page.date | date: "%Y 年 %m 月 %d 日" }}
    </div>

    {% include disqus.html %}
  </article>

  <aside class="post-sidebar" id="post-sidebar" style="position:fixed!important;top:90px!important;right:20px!important;width:220px;z-index:100;max-height:calc(100vh - 110px);overflow-y:auto;">
    <div class="sidebar-card" id="toc-section">
      <button class="sidebar-toggle" id="toc-toggle">
        <span>📑 目录</span>
        <span class="toggle-icon" id="toc-icon">▶</span>
      </button>
      <nav class="toc-list" id="toc" hidden></nav>
    </div>
    <div class="sidebar-card" id="keywords-section">
      <h3 class="sidebar-card-title">🏷️ 关键词</h3>
      <div class="keywords-list" id="keywords"></div>
    </div>
  </aside>
</div>

<script>
(function() {
  var entry = document.querySelector('.entry');
  if (!entry) return;

  // ── Prepare headings ──
  var headings = entry.querySelectorAll('h1, h2, h3');
  var toc = document.getElementById('toc');
  var tocSection = document.getElementById('toc-section');
  var tocToggle = document.getElementById('toc-toggle');
  var tocIcon = document.getElementById('toc-icon');

  if (headings.length >= 2) {
    var tocHtml = '<ul>';
    headings.forEach(function(h) {
      if (!h.id) {
        h.id = h.textContent
          .toLowerCase()
          .replace(/[^a-z0-9一-鿿]+/g, '-')
          .replace(/^-|-$/g, '');
      }
      var level = h.tagName.toLowerCase();
      tocHtml += '<li class="toc-item toc-' + level + '"><a href="#' + h.id + '">' + h.textContent + '</a></li>';
    });
    tocHtml += '</ul>';
    toc.innerHTML = tocHtml;

    // Manual toggle
    var expanded = false;
    tocToggle.addEventListener('click', function() {
      expanded = !expanded;
      toc.hidden = !expanded;
      tocIcon.textContent = expanded ? '▼' : '▶';
    });

    // Auto-expand + highlight on scroll
    var tocItems = toc.querySelectorAll('.toc-item');
    var onScroll = function() {
      var current = '';
      headings.forEach(function(h) {
        if (h.getBoundingClientRect().top <= 120) current = h.id;
      });
      tocItems.forEach(function(li) {
        var a = li.querySelector('a');
        if (!a) return;
        li.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
      if (current && !expanded) {
        expanded = true;
        toc.hidden = false;
        tocIcon.textContent = '▼';
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  } else {
    tocSection.style.display = 'none';
  }

  // ── Keywords ──
  var refs = entry.querySelectorAll('.gloss-ref');
  var kwContainer = document.getElementById('keywords');
  var kwSection = document.getElementById('keywords-section');

  if (refs.length > 0) {
    var seen = {};
    var kwHtml = '';
    refs.forEach(function(ref) {
      var term = ref.dataset.term;
      if (!seen[term]) {
        seen[term] = true;
        var def = ref.dataset.def || '';
        var url = ref.dataset.url || '';
        kwHtml += '<span class="keyword-tag" data-term="' + encodeURIComponent(term) + '" data-def="' + encodeURIComponent(def) + '" data-url="' + encodeURIComponent(url) + '">' + term + '</span>';
      }
    });
    kwContainer.innerHTML = kwHtml;
    kwContainer.addEventListener('click', function(e) {
      var tag = e.target.closest('.keyword-tag');
      if (!tag) return;
      var term = decodeURIComponent(tag.dataset.term);
      var def = decodeURIComponent(tag.dataset.def);
      var url = decodeURIComponent(tag.dataset.url);
      if (window.glossOpen) window.glossOpen(term, def, url);
    });
  } else {
    kwSection.style.display = 'none';
  }

  if (tocSection.style.display === 'none' && kwSection.style.display === 'none') {
    document.getElementById('post-sidebar').style.display = 'none';
  }
})();
</script>
