---
layout: default
---

<article class="post page-content">
  <div class="post-layout">
    <div class="post-body">
      <div class="post-header">
        <h1>{{ page.title }}</h1>
      </div>

      <div class="entry">
        {{ content }}
      </div>

      <div class="date">
        {{ page.date | date: "%Y 年 %m 月 %d 日" }}
      </div>

      {% include disqus.html %}
    </div>

    <aside class="post-sidebar" id="post-sidebar">
      <div class="sidebar-section" id="toc-section">
        <h3 class="sidebar-title">📑 目录</h3>
        <nav class="toc-list" id="toc"></nav>
      </div>
      <div class="sidebar-section" id="keywords-section">
        <h3 class="sidebar-title">🏷️ 关键词</h3>
        <div class="keywords-list" id="keywords"></div>
      </div>
    </aside>
  </div>
</article>

<script>
(function() {
  var entry = document.querySelector('.entry');
  if (!entry) return;
  var sidebar = document.getElementById('post-sidebar');

  // ── TOC: scan headings ──
  var headings = entry.querySelectorAll('h1, h2, h3');
  var toc = document.getElementById('toc');

  if (headings.length >= 2) {
    var tocHtml = '<ul>';
    headings.forEach(function(h) {
      if (!h.id) {
        h.id = h.textContent
          .toLowerCase()
          .replace(/[^a-z0-9一-鿿]+/g, '-')
          .replace(/^-|-$/g, '');
      }
      var level = h.tagName.toLowerCase(); // h1, h2, h3
      tocHtml += '<li class="toc-' + level + '"><a href="#' + h.id + '">' + h.textContent + '</a></li>';
    });
    tocHtml += '</ul>';
    toc.innerHTML = tocHtml;
  } else {
    document.getElementById('toc-section').style.display = 'none';
  }

  // ── Keywords: collect unique gloss-ref terms ──
  var refs = entry.querySelectorAll('.gloss-ref');
  var kwContainer = document.getElementById('keywords');

  if (refs.length > 0) {
    var seen = {};
    var kwHtml = '';
    refs.forEach(function(ref) {
      var term = ref.dataset.term;
      if (!seen[term]) {
        seen[term] = true;
        var def = ref.dataset.def || '';
        var url = ref.dataset.url || '';
        kwHtml += '<span class="keyword-tag" data-term="' + encodeURIComponent(term) + '" data-def="' + encodeURIComponent(def) + '" data-url="' + encodeURIComponent(url) + '">' + term + '</span>';
      }
    });
    kwContainer.innerHTML = kwHtml;

    // Click keyword → open gloss dialog
    kwContainer.addEventListener('click', function(e) {
      var tag = e.target.closest('.keyword-tag');
      if (!tag) return;
      var term = decodeURIComponent(tag.dataset.term);
      var def = decodeURIComponent(tag.dataset.def);
      var url = decodeURIComponent(tag.dataset.url);
      if (window.glossOpen) {
        window.glossOpen(term, def, url);
      }
    });
  } else {
    document.getElementById('keywords-section').style.display = 'none';
  }

  // ── Highlight current TOC item on scroll ──
  if (headings.length >= 2) {
    var tocLinks = toc.querySelectorAll('a');
    var onScroll = function() {
      var currentId = '';
      headings.forEach(function(h) {
        var rect = h.getBoundingClientRect();
        if (rect.top <= 100) currentId = h.id;
      });
      tocLinks.forEach(function(a) {
        a.parentElement.classList.toggle('active', a.getAttribute('href') === '#' + currentId);
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }
})();
</script>
