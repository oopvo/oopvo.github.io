---
layout: default
---

<article class="post page-content">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
  </div>

  <!-- TOC card -->
  <div class="toc-card" id="toc-section">
    <button class="toc-card-header" id="toc-toggle">
      <span>📑 目录</span>
      <span class="toc-card-count" id="toc-count"></span>
      <span class="toc-card-arrow" id="toc-arrow">▶</span>
    </button>
    <nav class="toc-card-body" id="toc" hidden></nav>
  </div>

  <!-- Keywords card -->
  <div class="kw-card" id="keywords-section">
    <div class="kw-card-header">🏷️ 关键词</div>
    <div class="kw-card-body" id="keywords"></div>
  </div>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    {{ page.date | date: "%Y 年 %m 月 %d 日" }}
  </div>

  {% include disqus.html %}
</article>

<script>
(function() {
  var entry = document.querySelector('.entry');
  if (!entry) return;

  // ── TOC ──
  var headings = entry.querySelectorAll('h1, h2, h3');
  var toc = document.getElementById('toc');
  var tocSection = document.getElementById('toc-section');
  var tocToggle = document.getElementById('toc-toggle');
  var tocArrow = document.getElementById('toc-arrow');
  var tocCount = document.getElementById('toc-count');

  if (headings.length >= 2) {
    var html = '<ul>';
    headings.forEach(function(h) {
      if (!h.id) {
        h.id = h.textContent.toLowerCase().replace(/[^a-z0-9一-鿿]+/g, '-').replace(/^-|-$/g, '');
      }
      html += '<li class="toc-i toc-' + h.tagName.toLowerCase() + '"><a href="#' + h.id + '">' + h.textContent + '</a></li>';
    });
    html += '</ul>';
    toc.innerHTML = html;
    tocCount.textContent = headings.length + ' 章节';

    var expanded = false;
    tocToggle.addEventListener('click', function() {
      expanded = !expanded;
      toc.hidden = !expanded;
      tocArrow.textContent = expanded ? '▼' : '▶';
      tocToggle.classList.toggle('open', expanded);
    });

    var tocItems = toc.querySelectorAll('.toc-i');
    var onScroll = function() {
      var current = '';
      headings.forEach(function(h) {
        if (h.getBoundingClientRect().top <= 120) current = h.id;
      });
      tocItems.forEach(function(li) {
        var a = li.querySelector('a');
        if (!a) return;
        li.classList.toggle('on', a.getAttribute('href') === '#' + current);
      });
      if (current && !expanded) {
        expanded = true;
        toc.hidden = false;
        tocArrow.textContent = '▼';
        tocToggle.classList.add('open');
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  } else {
    tocSection.style.display = 'none';
  }

  // ── Keywords ──
  var refs = entry.querySelectorAll('.gloss-ref');
  var kw = document.getElementById('keywords');
  var kwSection = document.getElementById('keywords-section');

  if (refs.length > 0) {
    var seen = {};
    refs.forEach(function(ref) {
      var term = ref.dataset.term;
      if (!seen[term]) {
        seen[term] = true;
        var span = document.createElement('span');
        span.className = 'kw-tag';
        span.textContent = term;
        span.dataset.term = term;
        span.dataset.def = ref.dataset.def || '';
        span.dataset.url = ref.dataset.url || '';
        kw.appendChild(span);
      }
    });
    kw.addEventListener('click', function(e) {
      var tag = e.target.closest('.kw-tag');
      if (!tag) return;
      if (window.glossOpen) {
        window.glossOpen(tag.dataset.term, tag.dataset.def, tag.dataset.url);
      }
    });
  } else {
    kwSection.style.display = 'none';
  }
})();
</script>
