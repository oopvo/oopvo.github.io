---
layout: default
---

<article class="post page-content">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
  </div>

  <!-- In-article TOC + Keywords -->
  <div class="post-toc-bar" id="toc-section">
    <button class="toc-bar-toggle" id="toc-toggle">
      <span class="toc-bar-label">📑 目录</span>
      <span class="toc-bar-icon" id="toc-icon">▶</span>
    </button>
    <nav class="toc-bar-list" id="toc" hidden></nav>
    <div class="toc-bar-keywords" id="keywords-section">
      <span class="toc-bar-kw-label">🏷️ </span>
      <span class="keywords-list" id="keywords"></span>
    </div>
  </div>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    {{ page.date | date: "%Y 年 %m 月 %d 日" }}
  </div>

  {% include disqus.html %}
</article>

<script>
(function() {
  var entry = document.querySelector('.entry');
  if (!entry) return;

  var headings = entry.querySelectorAll('h1, h2, h3');
  var toc = document.getElementById('toc');
  var tocSection = document.getElementById('toc-section');
  var tocToggle = document.getElementById('toc-toggle');
  var tocIcon = document.getElementById('toc-icon');

  // ── TOC ──
  if (headings.length >= 2) {
    var html = '<ul>';
    headings.forEach(function(h) {
      if (!h.id) {
        h.id = h.textContent.toLowerCase().replace(/[^a-z0-9一-鿿]+/g, '-').replace(/^-|-$/g, '');
      }
      html += '<li class="toc-item toc-' + h.tagName.toLowerCase() + '"><a href="#' + h.id + '">' + h.textContent + '</a></li>';
    });
    html += '</ul>';
    toc.innerHTML = html;

    var expanded = false;
    tocToggle.addEventListener('click', function() {
      expanded = !expanded;
      toc.hidden = !expanded;
      tocIcon.textContent = expanded ? '▼' : '▶';
    });

    var tocItems = toc.querySelectorAll('.toc-item');
    var onScroll = function() {
      var current = '';
      headings.forEach(function(h) {
        if (h.getBoundingClientRect().top <= 120) current = h.id;
      });
      tocItems.forEach(function(li) {
        var a = li.querySelector('a');
        if (!a) return;
        li.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
      if (current && !expanded) {
        expanded = true;
        toc.hidden = false;
        tocIcon.textContent = '▼';
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  } else {
    tocSection.style.display = 'none';
  }

  // ── Keywords ──
  var refs = entry.querySelectorAll('.gloss-ref');
  var kw = document.getElementById('keywords');
  var kwSection = document.getElementById('keywords-section');

  if (refs.length > 0) {
    var seen = {};
    refs.forEach(function(ref) {
      var term = ref.dataset.term;
      if (!seen[term]) {
        seen[term] = true;
        var def = ref.dataset.def || '', url = ref.dataset.url || '';
        kw.innerHTML += '<span class="keyword-tag" data-term="' + encodeURIComponent(term) + '" data-def="' + encodeURIComponent(def) + '" data-url="' + encodeURIComponent(url) + '">' + term + '</span> ';
      }
    });
    kw.addEventListener('click', function(e) {
      var tag = e.target.closest('.keyword-tag');
      if (!tag) return;
      if (window.glossOpen) {
        window.glossOpen(decodeURIComponent(tag.dataset.term), decodeURIComponent(tag.dataset.def), decodeURIComponent(tag.dataset.url));
      }
    });
  } else {
    kwSection.style.display = 'none';
  }
})();
</script>
