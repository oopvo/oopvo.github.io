---
layout: default
---

<article class="post page-content{% if page.glossary %} has-gloss{% endif %}">
  <h1>{{ page.title }}</h1>

  <div class="entry{% if page.glossary %} entry-gloss{% endif %}">
    {{ content }}
  </div>

  <div class="date">
    {{ page.date | date: "%Y 年 %m 月 %d 日" }}
  </div>

  {% include disqus.html %}
</article>
