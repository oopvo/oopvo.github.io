- term: "Transformer"
  def: "一种基于自注意力机制的深度神经网络架构，2017 年由 Google 在论文「Attention Is All You Need」中提出。它彻底摒弃了传统的循环神经网络（RNN）和卷积神经网络（CNN），完全依赖注意力机制来建模序列数据中的长距离依赖关系。核心组件包括多头注意力、位置编码和前馈网络。Transformer 的并行计算能力使其训练效率远超 RNN，是现代大语言模型（GPT、BERT、Llama、DeepSeek 等）的基础架构，也是深度学习历史上最重要的里程碑之一。"
  url: "/glossary/transformer/"
  group: 基础架构
  order: 1

- term: "Attention"
  def: "注意力机制，一种让模型在处理每个位置时能够动态关注输入序列中其他位置的机制。核心思想是通过加权聚合上下文信息来增强当前位置的表示。具体计算分三步：1）Q（Query）与所有 K（Key）计算相似度得分；2）Softmax 归一化为概率分布；3）用该概率加权求和 V（Value）得到输出。公式：Attention(Q,K,V) = softmax(QK^T/√d_k)V。Attention 解决了 RNN 中长距离信息衰减的问题，一步到位建立任意两个位置的直接连接。"
  url: "/glossary/attention/"
  group: 基础架构
  order: 2

- term: "Multi-Head Attention"
  def: "多头注意力是 Transformer 的核心组件。它不满足于单一的注意力计算，而是将 Q、K、V 分别投影到多个子空间（头），在每个子空间中独立并行计算注意力，最后将所有头的输出拼接并进行线性变换。常见的配置是 8 或 16 个头，每个头专注于不同类型的模式（如语法关系、指代关系、语义相似性）。多头设计让模型能从不同表示子空间同时关注信息，显著增强了表达能力，而总计算量与单头基本持平（每个头的维度降低）。"
  url: "/glossary/multihead-attention/"
  group: 基础架构
  order: 3

- term: "Positional Encoding"
  def: "位置编码用于解决 Transformer 自注意力机制的固有问题——置换不变性（即无法区分词序）。不加位置信息时，「猫追老鼠」和「老鼠追猫」在 Attention 看来完全一样。位置编码为每个位置注入唯一的位置信号。原论文使用正弦/余弦函数生成不同频率的编码（低维高频区分邻近位置，高维低频编码远距离关系）。现代模型多使用 RoPE（旋转位置编码），它通过旋转矩阵将位置信息编码到 Q 和 K 中，天然支持相对位置感知。"
  url: "/glossary/positional-encoding/"
  group: 基础架构
  order: 4

- term: "Degradation Problem"
  def: "退化问题是 ResNet 论文发现的反直觉现象：随着神经网络深度增加，模型性能出现饱和甚至下降。56 层网络的训练误差反而高于 20 层网络，这并非过拟合（过拟合时训练误差低），而是优化困难——深层网络难以通过 SGD 学习恒等映射 H(x)=x。当额外层对已有表示没有贡献时，理论上应该输出恒等映射，但实际上 SGD 很难调整权重到单位矩阵附近。退化问题的发现促使了残差学习的提出，是深度学习历史上最重要的观察之一。"
  url: "/glossary/degradation-problem/"
  group: 残差网络
  order: 1

- term: "Residual Learning"
  def: "残差学习是 ResNet 的核心思想，也是解决退化问题的关键。传统网络直接学习目标映射 H(x)，而残差网络学习残差 F(x)=H(x)-x，原始映射通过 F(x)+x 恢复。当需要恒等映射时（H(x)=x），传统网络需要将权重调整到单位矩阵附近（困难），而残差网络只需学习 F(x)=0——把权重趋向于 0 即可（容易）。这一简单的目标变换让深层网络的优化变得可行，是深度学习设计中最优雅的洞察之一。"
  url: "/glossary/residual-learning/"
  group: 残差网络
  order: 2

- term: "Shortcut Connections"
  def: "快捷连接（也称跳跃连接或残差连接）是 ResNet 实现残差学习的工程手段。它将输入直接跳过一些权重层传递到后面的层，通过一个简单的加法操作实现：output = F(x) + x。快捷连接本身不包含参数，不增加计算量，但为梯度提供了「高速公路」——梯度可以直接通过快捷连接回传到浅层，避免梯度消失。这一设计被 Transformer、GAN、Diffusion 模型等几乎所有现代架构广泛采用，是深度学习最基础的基础设施之一。"
  url: "/glossary/shortcut-connections/"
  group: 残差网络
  order: 3

- term: "ResNet"
  def: "Residual Network（残差网络），2015 年由 Kaiming He 等人在 CVPR 2016（Best Paper）上提出。通过残差学习 + 快捷连接解决了深层网络的退化问题，成功训练了 152 层网络（当时 VGG 仅 19 层）。在 ImageNet 上以 3.57% 的 top-5 错误率赢得 ILSVRC 2015 冠军，被引超过 200,000 次。ResNet 证明了「越深越好」在正确的架构设计下是可行的，开启了超深网络的时代，其残差连接思想更是渗透到了深度学习的每一个角落。"
  url: "/glossary/resnet/"
  group: 残差网络
  order: 4

- term: "VAE"
  def: "Variational Autoencoder（变分自编码器），由 Kingma & Welling 于 2014 年在 ICLR 提出的生成模型。与普通自编码器将输入编码为一个固定向量不同，VAE 的编码器输出一个概率分布的参数（均值 μ 和方差 σ²），然后从该分布采样得到潜在变量 z，再由解码器生成新数据。损失函数由重构损失和 KL 散度两部分组成，前者保证重建质量，后者规整潜在空间。训练完成后，可以直接从标准正态分布采样 z 来生成全新的数据。VAE 是生成模型的基石，衍生出 β-VAE、VQ-VAE 等众多变体。"
  url: "/glossary/vae/"
  group: 生成模型
  order: 1

- term: "KL Divergence"
  def: "Kullback-Leibler 散度（KL 散度），衡量两个概率分布之间差异的指标（非对称）。在机器学习中广泛用于正则化——强制一个分布接近另一个分布。在 VAE 中，KL 散度作为正则化项，强制近似后验分布 q(z|x) 接近先验分布 p(z)=N(0,I)，防止潜在空间过度发散，让潜在空间具有良好的连续性和可插值性。对于两个高斯分布，KL 散度有闭合解：D_KL = -0.5 × Σ(1 + log(σ²) - μ² - σ²)。KL 散度还是信息论中相对熵的概念，表示用分布 q 编码来自分布 p 的数据所需的额外信息量。"
  url: "/glossary/kl-divergence/"
  group: 生成模型
  order: 2

- term: "Reparameterization Trick"
  def: "重参数化技巧，解决 VAE 训练中采样操作不可微的关键技术。VAE 需要从 N(μ, σ²) 中采样得到 z，但采样操作是离散的、无梯度的。重参数化技巧将采样拆解为确定性变换加独立噪声：z = μ + σ × ε（其中 ε ∼ N(0,I)）。这样 μ 和 σ 的梯度可以沿 z 反向传播到编码器，实现端到端的 SGD 训练。这一技巧不仅用于 VAE，还被广泛应用于变分推断、强化学习中的随机策略梯度等需要「在不可微操作中传播梯度」的场景。"
  url: "/glossary/reparameterization-trick/"
  group: 生成模型
  order: 3

- term: "MoE"
  def: "Mixture of Experts（混合专家模型），一种通过稀疏激活大幅增加模型容量的架构设计。它将 Transformer 的前馈网络（FFN）替换为多个「专家」子网络（通常 8-256 个），每个 token 通过门控路由网络动态选择少量专家（Top-2 或 Top-8）进行计算。核心优势：总参数量随专家数线性增加，但每 token 的计算量仅随激活专家数增加——实现了参数规模和计算成本的解耦。DeepSeek-V3 使用 256 个路由专家 + 1 个共享专家，总参数 671B 但每 token 仅激活 37B。GPT-4、Mixtral、DeepSeek 等顶级模型均采用 MoE 架构。"
  url: "/glossary/moe/"
  group: 混合专家
  order: 1

- term: "Auxiliary Loss"
  def: "辅助损失函数，在 MoE 训练中用于平衡各专家负载的传统方法。MoE 训练中，路由网络可能倾向于将大部分 token 分配给少数专家，导致负载不均、算力浪费。解决方法是加入一个辅助损失项来惩罚负载不均衡：Loss_total = Loss_main + α × Loss_aux。α 是需要手动调节的超参数，设置不当会干扰主任务。DeepSeek-V3 创新性地提出了无辅助损失的动态 bias 调整策略，通过直接在门控分数上加减偏置值来平衡负载，完全消除了 α 调参的需求，是 MoE 训练的重要改进。"
  url: "/glossary/auxiliary-loss/"
  group: 混合专家
  order: 2

- term: "AdaptiveMoE"
  def: "自适应 MoE 路由，DeepSeek-V4 对 MoE 路由机制的改进。传统 MoE 对所有 token 一视同仁，激活固定数量的专家。AdaptiveMoE 的核心洞察是：不同 token 的难度不同，应当分配不同计算量。它使用一个轻量级路由预测头（1 层 MLP，额外参数 < 0.01%）评估每个 token 的困难度，简单 token 激活 2-4 个专家快速处理，复杂 token 激活 16 个专家深度处理。效果：平均激活参数降低 20%，推理速度提升 18%，复杂任务准确率提升 3.2%。"
  url: "/glossary/adaptivemoe/"
  group: 混合专家
  order: 3

- term: "MoDE"
  def: "Mixture of Depth Experts（深度混合专家），DeepSeek-V4 引入的新型架构。与标准 MoE 在每一层使用相同数量和密度的专家不同，MoDE 沿深度维度分配不同计算密度的专家层：浅层（1-8 层）使用 4 个轻量专家快速处理模式匹配；中层（9-24 层）使用 16 个标准专家进行语义理解；深层（25-40 层）使用 32 个重型专家进行复杂推理。总参数量 1.2T，每 token 仅激活 42B（3.5%），在相同的推理计算量下实现了更高效的资源分配。"
  url: "/glossary/mode/"
  group: 混合专家
  order: 4

- term: "MLA"
  def: "Multi-head Latent Attention（多头潜在注意力），DeepSeek-V3 的核心创新之一。它通过将 Key/Value 缓存压缩到低维潜在空间（512 维）来解决长上下文推理中的内存瓶颈。相比标准 MHA（每层 10.73GB KV 缓存），MLA 仅需 0.151GB（减少 98.6%）。更巧妙的是 KV 权重吸收设计：解压缩矩阵 W_uk 和 W_uv 在计算时被吸收进 Q 和输出投影矩阵中，实现零额外开销的解压缩。MLA 使 DeepSeek-V3 在 128K 长上下文下推理速度提升 3.2 倍，是长上下文大模型的关键使能技术。"
  url: "/glossary/mla/"
  group: 注意力演进
  order: 4

- term: "HyperMLA"
  def: "超大规模潜在注意力，MLA 的下一代演进。将 KV 压缩维度从 512 扩展到 2048，并引入层级式潜在编码：第一层局部编码（512 维）缓存近 4096 tokens 的细粒度信息，第二层全局编码（1024 维）压缩全上下文的语义摘要，第三层语义编码（512 维）存储高频知识模式的抽象表示。结合滑动窗口密集注意力 + 远程层级稀疏注意力，支持 1M+ token 的超长上下文窗口，KV 缓存仅为标准 MHA 的 0.5%，长文检索准确率达 98.7%。"
  url: "/glossary/hypermla/"
  group: 注意力演进
  order: 4

- term: "DSA"
  def: "DeepSeek Sparse Attention（稀疏注意力），DeepSeek-V3.2 引入的两级注意力机制。第一级使用闪电索引器快速粗筛，为每个 query 从大量 past keys 中挑选出最相关的候选 key；第二级对候选 key 进行细粒度精确选择，只保留最关键的 k 个 token 做标准注意力计算。最终复杂度从 O(n²) 降至 O(n·k)（k << n），在长上下文场景下大幅减少计算量。DSA 代表了注意力机制从密集到稀疏的演进方向，是突破长上下文效率瓶颈的关键技术。"
  url: "/glossary/dsa/"
  group: 注意力演进
  order: 3

- term: "GQA"
  def: "Grouped-Query Attention（分组查询注意力），MHA（多头注意力）和 MQA（单查询注意力）的折中方案。标准 MHA 有 N 个 Query 头，每个头对应独立的 Key/Value 头，KV 缓存大但质量好。MQA 让所有 Query 头共享一组 K/V，缓存最小但质量略降。GQA 将 Query 头分为若干组，每组共享一个 K/V 头——Llama 2/3 使用的配置是 8 组（64 个 Q 头，8 个 K/V 头）。相比 MHA，GQA 减少 87.5% 的 KV 缓存，而质量损失极小，成为 Llama、Qwen、Gemma 等主流模型的标准选择。"
  url: "/glossary/gqa/"
  group: 注意力演进
  order: 2

- term: "FP8"
  def: "8-bit Floating Point（8 位浮点数格式），一种低精度数值格式。FP8 有两种主流变体：E4M3（4 位指数 + 3 位尾数）用于前向传播，精度较高但范围有限；E5M2（5 位指数 + 2 位尾数）用于反向传播，范围更广但精度更低。相比 FP16 减少 50% 显存占用，相比 FP32 减少 75%。DeepSeek-V3 是首个在超大规模（671B）上成功使用 FP8 训练的模型，通过块级量化（每 128 个元素一组独立缩放）将量化误差控制在 0.25% 以内，训练成本降低约 50%。"
  url: "/glossary/fp8/"
  group: 训练优化
  order: 1

- term: "MTP"
  def: "Multi-Token Prediction（多 Token 预测），DeepSeek-V3 引入的训练目标创新。传统语言模型在训练时每个位置只预测下一个 token，而 MTP 让模型同时预测多个未来 token（通常是 D=2 或 3 个）。实现方式是在主预测头之外增加 D-1 个辅助预测头，每个辅助头预测第 k 步后的 token。这些辅助头在推理时被丢弃，因此推理零额外开销。MTP 通过强制模型学习更长距离的依赖关系，提升了代码生成和数学推理任务的表现，同时还可用于投机解码加速推理。"
  url: "/glossary/mtp/"
  group: 训练优化
  order: 2

- term: "SFT"
  def: "Supervised Fine-Tuning（监督微调），大模型训练三阶段中的第二阶段。预训练后的模型虽然具有丰富的语言知识，但缺乏遵循指令的能力。SFT 使用人工标注的高质量指令-回答对（通常数万到数百万条）对模型进行进一步训练，使其能够理解并遵循用户意图、按照期望的格式输出、拒绝不当请求。SFT 是连接预训练和强化学习（RL）之间的关键桥梁。数据质量比数据数量更重要——几千条精心标注的 SFT 数据就足以显著提升模型的对齐质量。"
  url: "/glossary/sft/"
  group: 对齐训练
  order: 1

- term: "PPO"
  def: "Proximal Policy Optimization（近端策略优化），OpenAI 于 2017 年提出的经典强化学习算法。在 RLHF（基于人类反馈的强化学习）中被广泛使用，用于微调大语言模型以对齐人类偏好。PPO 的核心思想是裁剪策略更新幅度——每次更新时新策略不能偏离旧策略太远，否则裁剪机制会阻止更新，从而保证训练稳定性。PPO 需要同时维护一个 Actor（策略模型）和一个 Critic（价值模型），Critic 用于估计优势函数。这一设计导致显存开销翻倍，且 Critic 本身训练不稳定。PPO 的局限性催生了 GRPO 等更高效的替代方案。"
  url: "/glossary/ppo/"
  group: 对齐训练
  order: 2

- term: "GRPO"
  def: "Group Relative Policy Optimization（分组相对策略优化），DeepSeek 自研的强化学习算法，用于替代 PPO。GRPO 的核心创新是去掉了 PPO 中的 Critic 模型（价值函数模型）。对于每个输入 prompt，GRPO 让当前策略生成多个回答，然后对这组回答的奖励进行内部归一化（减去组均值、除以组标准差），用归一化后的相对优劣作为训练信号。优势：1）无需 Critic 模型，显存减半；2）组内相对比较避免了绝对评分的不一致性；3）训练更稳定，无需担心 Critic 不收敛的问题。GRPO 已被 DeepSeek-V3/R1 等模型验证为高效的 RL 对齐方法。"
  url: "/glossary/grpo/"
  group: 对齐训练
  order: 3

- term: "Self-Play RL"
  def: "自博弈强化学习，一种无需外部标注的自动化训练方法。核心流程是自我对弈的循环：模型生成解题过程→自我验证并评分→筛选高质量数据→继续训练→评估→生成更高质量的数据。DeepSeek-V4 将 Self-Play RL 扩展到三个全新领域：数学证明（生成证明步骤并验证逻辑链）、代码合成（生成代码并运行测试验证）、科学发现（提出假设并设计验证）。Self-Play RL 建立在 GRPO 的基础上——GRPO 提供组内比较的奖励信号，Self-Play 提供数据生成的自动化流程，两者结合打破了 RLHF 的数据标注瓶颈。"
  url: "/glossary/selfplay-rl/"
  group: 对齐训练
  order: 4

- term: "NeuralCache"
  def: "神经缓存系统，DeepSeek-V4 引入的可学习缓存层。与传统 KV Cache 缓存每个 token 的 Key/Value 不同，NeuralCache 在潜在空间中对高频知识模式进行压缩缓存。对于常见问答（如百科事实、代码 API 用法），NeuralCache 可以在语义层面直接命中缓存，跳过完整的注意力计算，实现 5-10× 的延迟降低。工作流程：语义匹配器使用快速傅里叶变换进行相似度搜索→命中则从缓存直接读取→未命中则完整计算并将结果写入缓存。本质上相当于给大模型配备了一个语义级缓存系统。"
  url: "/glossary/neuralcache/"
  group: 推理优化
  order: 1

- term: "Llama"
  def: "Large Language Model Meta AI，Meta 开发的开源大语言模型系列。包括 Llama 1（2023.02，开源先驱）、Llama 2（2023.07，首个开源商用）、Llama 3（2024.04，405B 当时最大开源密集模型）和 Llama 4（2025.04，首次采用 MoE 架构）。关键技术创新包括引入 GQA 分组查询注意力、SwiGLU 门控激活函数、RMSNorm 简化归一化。Llama 系列以开源、高效、高质量著称，推动了整个开源大模型生态的发展，是 GPT 系列之外最具影响力的模型家族。"
  url: "/glossary/llama/"
  group: 基础架构
  order: 5

- term: "SwiGLU"
  def: "Swish-Gated Linear Unit（门控线性单元），LLaMA 系列使用的激活函数。结合了 Swish 激活函数（平滑版 ReLU）和 GLU（门控线性单元）的优势：SwiGLU(x) = Swish(xW_gate) ⊗ (xW_up)。相比 ReLU 的简单截断，SwiGLU 通过门控机制让网络可以动态选择哪些信息通过，类似 LSTM 中的门控思想。代价是增加了一个额外的投影矩阵，FFN 层参数量增加约 1/3。在相同计算量下，SwiGLU 比 ReLU 提升约 0.5-1.0% 的模型质量，是 PaLM、Llama、Qwen 等现代大模型的标配激活函数。"
  url: "/glossary/swiglu/"
  group: 基础架构
  order: 6

- term: "RMSNorm"
  def: "Root Mean Square Layer Normalization（均方根层归一化），LayerNorm 的简化变体。完整的 LayerNorm 做两件事：中心化（减均值）和缩放（除标准差）。RMSNorm 发现中心化步骤在 Transformer 中不是必需的——只做缩放就够：RMSNorm(x) = x / RMS(x) × γ，其中 RMS(x) = √(1/n × Σx²)。相比 LayerNorm 节省约 10-15% 的计算量，而在 Transformer 中的表现与 LayerNorm 相当。由于其简洁高效，RMSNorm 被 Llama、Qwen、Mistral、Gemma 等几乎所有主流模型采用，是现代大模型架构的标准配置。"
  url: "/glossary/rmsnorm/"
  group: 基础架构
  order: 7

- term: "Qwen"
  def: "通义千问，阿里巴巴开发的大语言模型系列。包括 Qwen 1（2023.08）、Qwen 2（2024.06）、Qwen 2.5（2024.12）和 Qwen 3（2025.04）。核心优势是多语言能力（尤其中英双语突出）和长上下文处理（Qwen 3 支持 256K）。Qwen 3 旗舰版（235B-A22B）采用 MoE 架构，总参数 235B 每 token 仅激活 22B（9.4%），在多项基准上超越 DeepSeek-R1 和 OpenAI o1 的同时参数量仅为其 1/3。Qwen 还是最早实现混合推理（快思考 + 慢思考）的开源模型之一，并以 Apache 2.0 协议完全开源。"
  url: "/glossary/qwen/"
  group: 基础架构
  order: 8
